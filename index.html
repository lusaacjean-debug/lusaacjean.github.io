<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Conveyor Belt CM Inspection — 75-CV-03</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#132330;
    --ink-soft:#4b5c68;
    --paper:#eef1f3;
    --card:#ffffff;
    --line:#d7dde2;
    --navy:#1b3648;
    --navy-deep:#0f2330;
    --amber:#e0972c;
    --amber-deep:#9a6113;
    --ok:#2f7d5c;
    --ok-bg:#e4f3ec;
    --notok:#b4432f;
    --notok-bg:#fbe8e4;
    --na-bg:#eceff1;
    --focus:#2f7dc9;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:96px;
  }
  a{color:inherit;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:40;
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-deep) 100%);
    color:#fff;
    padding:14px 16px 12px;
    box-shadow:0 2px 10px rgba(0,0,0,.25);
  }
  .topbar-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .brand{display:flex; flex-direction:column; line-height:1.15;}
  .brand .eyebrow{
    font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
    color:#9fc3d6; font-weight:600;
  }
  .brand .title{font-size:17px; font-weight:700; margin-top:2px;}
  .tag-pill{
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.25);
    color:#fff; font-weight:700; font-size:13px;
    padding:6px 10px; border-radius:999px; white-space:nowrap;
  }
  .progress-wrap{margin-top:10px;}
  .progress-track{
    height:6px; border-radius:999px; background:rgba(255,255,255,.15); overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--amber),#f4b957);
    width:0%; transition:width .25s ease;
  }
  .progress-label{
    font-size:11.5px; color:#bcd2de; margin-top:5px; display:flex; justify-content:space-between;
  }
  .flag-banner{
    display:none;
    margin-top:10px; background:var(--notok); color:#fff; border-radius:8px;
    padding:8px 10px; font-size:12.5px; font-weight:600; align-items:center; gap:8px;
  }
  .flag-banner.show{display:flex;}

  /* ---------- Header form ---------- */
  .container{max-width:720px; margin:0 auto; padding:14px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:14px; overflow:hidden;
  }
  .header-card{padding:14px;}
  .field-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field.span2{grid-column:1 / -1;}
  label.small-label{
    font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft); font-weight:700;
  }
  input[type=text], input[type=date], textarea, select{
    font-family:inherit; font-size:15px; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:9px 10px;
    background:#fbfcfd; width:100%;
  }
  input:focus, textarea:focus, select:focus{
    outline:2px solid var(--focus); outline-offset:1px; border-color:var(--focus);
  }
  textarea{resize:vertical; min-height:56px; line-height:1.4;}
  .method-toggle{display:flex; gap:10px; margin-top:2px;}
  .chk{
    display:flex; align-items:center; gap:6px; font-size:14px; font-weight:600;
    border:1px solid var(--line); border-radius:8px; padding:8px 12px; background:#fbfcfd;
    flex:1; justify-content:center;
  }
  .chk input{width:16px; height:16px; accent-color:var(--navy);}

  /* ---------- Section cards ---------- */
  .section{border:1px solid var(--line); border-radius:var(--radius); background:var(--card); margin-bottom:12px;}
  .section-head{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:13px 14px; cursor:pointer; user-select:none;
  }
  .section-head-left{display:flex; align-items:center; gap:10px; min-width:0;}
  .section-index{
    font-size:11px; font-weight:800; color:#fff; background:var(--navy);
    border-radius:6px; padding:3px 7px; flex:none;
  }
  .section-title{font-weight:700; font-size:15.5px; overflow-wrap:anywhere;}
  .section-status{
    font-size:11px; font-weight:700; padding:3px 8px; border-radius:999px; flex:none;
  }
  .section-status.ok{background:var(--ok-bg); color:var(--ok);}
  .section-status.notok{background:var(--notok-bg); color:var(--notok);}
  .section-status.pending{background:var(--na-bg); color:var(--ink-soft);}
  .chevron{transition:transform .2s ease; flex:none; color:var(--ink-soft);}
  .section.open .chevron{transform:rotate(180deg);}
  .section-body{display:none; padding:0 14px 16px;}
  .section.open .section-body{display:block;}

  .item-row{
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    padding:11px 0; border-top:1px solid var(--line);
  }
  .item-row:first-child{border-top:none;}
  .item-label{font-size:14px; line-height:1.35; padding-top:6px; flex:1;}
  .segmented{display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; flex:none;}
  .seg-btn{
    border:none; background:#fbfcfd; padding:8px 11px; font-size:12.5px; font-weight:700;
    color:var(--ink-soft); cursor:pointer; border-right:1px solid var(--line);
    min-width:44px;
  }
  .seg-btn:last-child{border-right:none;}
  .seg-btn.active[data-v="ok"]{background:var(--ok); color:#fff;}
  .seg-btn.active[data-v="notok"]{background:var(--notok); color:#fff;}
  .seg-btn.active[data-v="na"]{background:#8a97a1; color:#fff;}

  .temp-block{margin-top:6px; padding-top:10px; border-top:1px solid var(--line);}
  .temp-note{font-size:12px; color:var(--amber-deep); font-weight:700; margin-bottom:8px;}
  .temp-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(110px,1fr)); gap:8px;}
  .temp-field{display:flex; flex-direction:column; gap:4px;}
  .temp-field label{font-size:11px; color:var(--ink-soft); font-weight:600;}
  .temp-field input{padding:7px 8px; font-size:14px;}

  .comment-block{margin-top:12px;}
  .comment-block label{display:block; margin-bottom:5px;}

  .photo-block{margin-top:12px;}
  .photo-strip{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
  .photo-thumb{
    position:relative; width:78px; height:78px; border-radius:8px; overflow:hidden;
    border:1px solid var(--line); flex:none;
  }
  .photo-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo-thumb button{
    position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%;
    border:none; background:rgba(20,20,20,.65); color:#fff; font-size:12px; line-height:1;
    cursor:pointer;
  }
  .photo-add{
    width:78px; height:78px; border-radius:8px; border:1.5px dashed #a9b6bf;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:#fbfcfd; color:var(--ink-soft); cursor:pointer; font-size:10.5px; font-weight:700;
    gap:3px; text-align:center;
  }
  .photo-add svg{width:18px; height:18px;}

  /* ---------- Bottom action bar ---------- */
  .actionbar{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:#fff; border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:flex; gap:8px; box-shadow:0 -4px 14px rgba(0,0,0,.08);
  }
  .btn{
    flex:1; border:none; border-radius:9px; padding:12px 10px; font-size:13.5px; font-weight:700;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-ghost{background:#eef1f3; color:var(--navy-deep); border:1px solid var(--line);}
  .btn-primary{background:var(--navy); color:#fff;}
  .btn-primary:disabled{opacity:.55;}
  .save-note{
    text-align:center; font-size:11px; color:var(--ink-soft); padding:6px 14px 0;
  }
  .save-note .dot{
    display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--ok);
    margin-right:5px; vertical-align:middle;
  }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; left:50%; bottom:86px; transform:translateX(-50%) translateY(10px);
    background:var(--navy-deep); color:#fff; padding:10px 16px; border-radius:999px;
    font-size:13px; font-weight:600; z-index:60; opacity:0; pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- Report (offscreen, used for PDF) ---------- */
  #reportRoot{
    position:fixed; left:-9999px; top:0; width:760px; background:#fff; color:#111;
    font-family:"Segoe UI", Arial, sans-serif; padding:28px;
  }
  #reportRoot h1{font-size:20px; margin:0 0 2px;}
  #reportRoot .sub{font-size:12px; color:#555; margin-bottom:14px;}
  #reportRoot table{width:100%; border-collapse:collapse; margin-bottom:14px; font-size:12px;}
  #reportRoot td, #reportRoot th{border:1px solid #ccc; padding:5px 7px; text-align:left; vertical-align:top;}
  #reportRoot .rep-section-title{
    background:#1b3648; color:#fff; font-weight:700; font-size:13px; padding:6px 8px; margin-top:16px; border-radius:4px 4px 0 0;
  }
  #reportRoot .rep-item{display:flex; justify-content:space-between; border-bottom:1px solid #e3e3e3; padding:5px 8px; font-size:12px;}
  #reportRoot .rep-status{font-weight:700;}
  #reportRoot .rep-status.ok{color:#2f7d5c;}
  #reportRoot .rep-status.notok{color:#b4432f;}
  #reportRoot .rep-status.na{color:#8a97a1;}
  #reportRoot .rep-comment{padding:6px 8px; font-size:11.5px; color:#333; background:#f7f8f9;}
  #reportRoot .rep-photos{display:flex; flex-wrap:wrap; gap:6px; padding:8px;}
  #reportRoot .rep-photos img{width:110px; height:110px; object-fit:cover; border-radius:4px; border:1px solid #ddd;}
  #reportRoot .rep-summary{display:flex; gap:14px; margin:10px 0 4px;}
  #reportRoot .rep-summary div{border:1px solid #ccc; border-radius:6px; padding:8px 12px; font-size:12px;}

  @media (max-width:400px){
    .field-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div class="brand">
      <span class="eyebrow">Condition Monitoring — Rotating Equipment</span>
      <span class="title">Yard Conveyor Belt</span>
    </div>
    <span class="tag-pill" id="tagPill">75-CV-03</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label"><span id="progressText">0 of 0 checks recorded</span><span id="progressPct">0%</span></div>
  </div>
  <div class="flag-banner" id="flagBanner">⚠ <span id="flagText"></span></div>
</div>

<div class="container">

  <div class="card header-card">
    <div class="field-grid">
      <div class="field">
        <label class="small-label" for="f_date">Date</label>
        <input type="date" id="f_date">
      </div>
      <div class="field">
        <label class="small-label" for="f_wo">WO #</label>
        <input type="text" id="f_wo" placeholder="Work order #">
      </div>
      <div class="field">
        <label class="small-label" for="f_checkby">Check by</label>
        <input type="text" id="f_checkby" placeholder="Name">
      </div>
      <div class="field">
        <label class="small-label" for="f_reviewby">Review by</label>
        <input type="text" id="f_reviewby" placeholder="Name">
      </div>
      <div class="field span2">
        <label class="small-label" for="f_tag">Equipment Tag #</label>
        <input type="text" id="f_tag" value="75-CV-03">
      </div>
      <div class="field span2">
        <label class="small-label">Inspection Method</label>
        <div class="method-toggle">
          <label class="chk"><input type="checkbox" id="f_visual"> Visual</label>
          <label class="chk"><input type="checkbox" id="f_vibration" checked> Vibration</label>
        </div>
      </div>
    </div>
  </div>

  <div id="sectionsRoot"></div>

</div>

<div class="toast" id="toast"></div>

<div class="save-note"><span class="dot"></span><span id="saveNote">Not saved yet</span></div>
<div class="actionbar">
  <button class="btn btn-ghost" id="btnClear">Clear form</button>
  <button class="btn btn-ghost" id="btnSave">Save draft</button>
  <button class="btn btn-primary" id="btnPdf">Download PDF</button>
</div>

<!-- Offscreen printable report -->
<div id="reportRoot"></div>

<script>
(function(){

  /* ---------------- Spec: mirrors the paper check sheet ---------------- */
  const SECTIONS = [
    { id:'safety', title:'Safety', items:[
        {id:'eq_tags', label:'Equipment Tags'},
        {id:'housekeeping', label:'Housekeeping - Cleaning'},
        {id:'handrail', label:'Hand rail - Grating'},
        {id:'terminal', label:'Terminal box - Grounding cables'}
      ]},
    { id:'motor', title:'Motor', tempNote:'Max. 76°C', items:[
        {id:'m_general', label:'General condition & Noise'},
        {id:'m_bolts', label:'Hold down bolts and Foundation base plate'}
      ], temps:[
        {id:'m_nde', label:'NDE'}, {id:'m_de', label:'DE'}, {id:'m_body', label:'Body'}
      ]},
    { id:'coupling1', title:'Grid Coupling — Motor Side', items:[
        {id:'c1_general', label:'General condition & Noise'},
        {id:'c1_cracks', label:'Inspect coupling hubs for cracks'}
      ], temps:[
        {id:'c1_temp', label:'Coupling Temp (°C)'}
      ]},
    { id:'gearbox', title:'Gearbox', tempNote:'87–93°C', items:[
        {id:'gb_general', label:'General condition & Noise'},
        {id:'gb_bolts', label:'Hold down bolts - Adaptor base & frame'},
        {id:'gb_seals', label:'Input/output shaft - casing oil seal leaks'},
        {id:'gb_lube', label:'Gearbox lube condition and oil level'}
      ], temps:[
        {id:'gb_s1', label:'Shaft 1'}, {id:'gb_s2', label:'Shaft 2'},
        {id:'gb_s3', label:'Shaft 3'}, {id:'gb_s4', label:'Shaft 4'},
        {id:'gb_casing', label:'Casing'}
      ]},
    { id:'coupling2', title:'Grid Coupling — Output Side', items:[
        {id:'c2_general', label:'General condition & Noise'},
        {id:'c2_cracks', label:'Inspect coupling hubs for cracks'},
        {id:'c2_key', label:'Coupling element key and key way'}
      ], temps:[
        {id:'c2_temp', label:'Coupling Temp (°C)'}
      ]},
    { id:'pulleys', title:'Head – Snub – Tail Pulley', items:[
        {id:'p_pillow', label:'General condition pillow block & Noise'},
        {id:'p_idler', label:'General condition carriage and return idler'},
        {id:'p_tracking', label:'Belt tracking, logging, scraper, skirting board, feed chute'}
      ], temps:[
        {id:'p_head_de', label:'Head DE'}, {id:'p_head_nde', label:'Head NDE'},
        {id:'p_snub_de', label:'Snub DE'}, {id:'p_snub_nde', label:'Snub NDE'},
        {id:'p_tail_de', label:'Tail DE'}, {id:'p_tail_nde', label:'Tail NDE'}
      ]},
    { id:'bend', title:'Bend – Counter Weight & Take-up Pulley', items:[
        {id:'b_pillow', label:'General pillow block condition & Noise'},
        {id:'b_guard', label:'Safety guard'}
      ], temps:[
        {id:'b1_de', label:'Bend 1 DE'}, {id:'b1_nde', label:'Bend 1 NDE'},
        {id:'b2_de', label:'Bend 2 DE'}, {id:'b2_nde', label:'Bend 2 NDE'},
        {id:'b3_de', label:'Bend 3 DE'}, {id:'b3_nde', label:'Bend 3 NDE'},
        {id:'tu_de', label:'Take-up DE'}, {id:'tu_nde', label:'Take-up NDE'}
      ]}
  ];

  const STORE_KEY = 'draft:75-CV-03';
  let state = { header:{}, items:{}, temps:{}, comments:{}, photos:{} };
  let saveTimer = null;

  /* ---------------- Build DOM ---------------- */
  const root = document.getElementById('sectionsRoot');

  SECTIONS.forEach((sec, idx) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.id = 'sec_' + sec.id;

    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `
      <div class="section-head-left">
        <span class="section-index">${String(idx+1).padStart(2,'0')}</span>
        <span class="section-title">${sec.title}</span>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="section-status pending" id="status_${sec.id}">Pending</span>
        <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>`;
    head.addEventListener('click', () => secEl.classList.toggle('open'));

    const body = document.createElement('div');
    body.className = 'section-body';

    sec.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <span class="item-label">${item.label}</span>
        <div class="segmented" data-item="${item.id}">
          <button type="button" class="seg-btn" data-v="ok">OK</button>
          <button type="button" class="seg-btn" data-v="notok">NOT OK</button>
          <button type="button" class="seg-btn" data-v="na">N/A</button>
        </div>`;
      row.querySelectorAll('.seg-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          row.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.items[item.id] = btn.dataset.v;
          refreshSection(sec);
          refreshProgress();
          scheduleSave();
        });
      });
      body.appendChild(row);
    });

    if (sec.temps && sec.temps.length){
      const tb = document.createElement('div');
      tb.className = 'temp-block';
      tb.innerHTML = (sec.tempNote ? `<div class="temp-note">Target range: ${sec.tempNote}</div>` : '') +
        `<div class="temp-grid">${sec.temps.map(t => `
          <div class="temp-field">
            <label>${t.label} (°C)</label>
            <input type="text" inputmode="decimal" data-temp="${t.id}" placeholder="—">
          </div>`).join('')}</div>`;
      body.appendChild(tb);
      tb.querySelectorAll('input[data-temp]').forEach(inp => {
        inp.addEventListener('input', () => { state.temps[inp.dataset.temp] = inp.value; scheduleSave(); });
      });
    }

    const cb = document.createElement('div');
    cb.className = 'comment-block';
    cb.innerHTML = `<label class="small-label">Observations / Comments</label>
      <textarea placeholder="Note any abnormal readings, wear, leaks, or actions taken…" data-comment="${sec.id}"></textarea>`;
    cb.querySelector('textarea').addEventListener('input', (e) => {
      state.comments[sec.id] = e.target.value; scheduleSave();
    });
    body.appendChild(cb);

    const pb = document.createElement('div');
    pb.className = 'photo-block';
    pb.innerHTML = `<label class="small-label">Photos</label>
      <div class="photo-strip" id="strip_${sec.id}">
        <label class="photo-add">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h3l2-2h6l2 2h3v12H4z"/><circle cx="12" cy="13" r="3.2"/></svg>
          Add
          <input type="file" accept="image/*" capture="environment" multiple style="display:none" data-photo="${sec.id}">
        </label>
      </div>`;
    body.appendChild(pb);
    const fileInput = pb.querySelector('input[data-photo]');
    fileInput.addEventListener('change', (e) => handlePhotos(sec.id, e.target.files, e.target));

    secEl.appendChild(head);
    secEl.appendChild(body);
    root.appendChild(secEl);
  });

  if (SECTIONS.length) document.getElementById('sec_' + SECTIONS[0].id).classList.add('open');

  function refreshSection(sec){
    const vals = sec.items.map(i => state.items[i.id]).filter(Boolean);
    const badge = document.getElementById('status_' + sec.id);
    if (vals.length === 0){ badge.textContent = 'Pending'; badge.className = 'section-status pending'; return; }
    if (vals.includes('notok')){ badge.textContent = 'Attention'; badge.className = 'section-status notok'; return; }
    if (vals.length === sec.items.length){ badge.textContent = 'OK'; badge.className = 'section-status ok'; return; }
    badge.textContent = vals.length + '/' + sec.items.length; badge.className = 'section-status pending';
  }

  function refreshProgress(){
    const totalItems = SECTIONS.reduce((n,s) => n + s.items.length, 0);
    const done = Object.keys(state.items).length;
    const pct = totalItems ? Math.round(done/totalItems*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' of ' + totalItems + ' checks recorded';
    document.getElementById('progressPct').textContent = pct + '%';

    const notOkItems = [];
    SECTIONS.forEach(sec => sec.items.forEach(i => {
      if (state.items[i.id] === 'notok') notOkItems.push(sec.title + ': ' + i.label);
    }));
    const banner = document.getElementById('flagBanner');
    if (notOkItems.length){
      banner.classList.add('show');
      document.getElementById('flagText').textContent =
        notOkItems.length + ' item' + (notOkItems.length>1?'s':'') + ' flagged Not OK — see section comments';
    } else {
      banner.classList.remove('show');
    }
  }

  /* ---------------- Photos ---------------- */
  function handlePhotos(secId, files, inputEl){
    if (!files || !files.length) return;
    state.photos[secId] = state.photos[secId] || [];
    Array.from(files).forEach(file => {
      compressImage(file, 900, 0.72).then(dataUrl => {
        state.photos[secId].push(dataUrl);
        renderPhotoStrip(secId);
        scheduleSave();
      }).catch(() => { showToast('Could not read that photo'); });
    });
    inputEl.value = '';
  }

  function compressImage(file, maxDim, quality){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = () => {
        const img = new Image();
        img.onerror = reject;
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxDim || h > maxDim){
            const scale = maxDim / Math.max(w,h);
            w = Math.round(w*scale); h = Math.round(h*scale);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function renderPhotoStrip(secId){
    const strip = document.getElementById('strip_' + secId);
    const addBtn = strip.querySelector('.photo-add');
    strip.querySelectorAll('.photo-thumb').forEach(el => el.remove());
    (state.photos[secId] || []).forEach((src, idx) => {
      const thumb = document.createElement('div');
      thumb.className = 'photo-thumb';
      thumb.innerHTML = `<img src="${src}" alt="Inspection photo"><button type="button" aria-label="Remove photo">✕</button>`;
      thumb.querySelector('button').addEventListener('click', () => {
        state.photos[secId].splice(idx,1);
        renderPhotoStrip(secId);
        scheduleSave();
      });
      strip.insertBefore(thumb, addBtn);
    });
  }

  /* ---------------- Header fields ---------------- */
  const headerIds = ['f_date','f_wo','f_checkby','f_reviewby','f_tag'];
  headerIds.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => { state.header[id] = el.value; scheduleSave();
      if (id === 'f_tag') document.getElementById('tagPill').textContent = el.value || '—';
    });
  });
  ['f_visual','f_vibration'].forEach(id => {
    document.getElementById(id).addEventListener('change', (e) => {
      state.header[id] = e.target.checked; scheduleSave();
    });
  });
  // default date = today
  document.getElementById('f_date').value = new Date().toISOString().slice(0,10);
  state.header.f_date = document.getElementById('f_date').value;
  state.header.f_tag = '75-CV-03';
  state.header.f_vibration = true;

  /* ---------------- Save / load draft (uses browser IndexedDB via localForage-free simple wrapper) ---------------- */
  function scheduleSave(){
    clearTimeout(saveTimer);
    document.getElementById('saveNote').textContent = 'Unsaved changes…';
    saveTimer = setTimeout(saveDraft, 900);
  }

  function saveDraft(showMsg){
    try{
      window.localStorage.setItem(STORE_KEY, JSON.stringify(state));
      const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      document.getElementById('saveNote').textContent = 'Saved ' + t;
      if (showMsg) showToast('Draft saved');
    } catch(err){
      document.getElementById('saveNote').textContent = 'Save unavailable in this browser';
    }
  }

  function loadDraft(){
    try{
      const raw = window.localStorage.getItem(STORE_KEY);
      if (raw){
        applyState(JSON.parse(raw));
        showToast('Restored your last draft');
      }
    } catch(err){ /* no draft yet, start fresh */ }
  }

  function applyState(saved){
    state = Object.assign({header:{}, items:{}, temps:{}, comments:{}, photos:{}}, saved);
    headerIds.forEach(id => { if (state.header[id] !== undefined) document.getElementById(id).value = state.header[id]; });
    document.getElementById('f_visual').checked = !!state.header.f_visual;
    document.getElementById('f_vibration').checked = state.header.f_vibration !== false;
    document.getElementById('tagPill').textContent = state.header.f_tag || '75-CV-03';

    SECTIONS.forEach(sec => {
      sec.items.forEach(item => {
        const v = state.items[item.id];
        if (v){
          const seg = document.querySelector(`.segmented[data-item="${item.id}"]`);
          seg.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.v === v));
        }
      });
      (sec.temps||[]).forEach(t => {
        const inp = document.querySelector(`input[data-temp="${t.id}"]`);
        if (inp && state.temps[t.id] !== undefined) inp.value = state.temps[t.id];
      });
      const ta = document.querySelector(`textarea[data-comment="${sec.id}"]`);
      if (ta && state.comments[sec.id]) ta.value = state.comments[sec.id];
      renderPhotoStrip(sec.id);
      refreshSection(sec);
    });
    refreshProgress();
  }

  document.getElementById('btnSave').addEventListener('click', () => saveDraft(true));

  document.getElementById('btnClear').addEventListener('click', () => {
    if (!confirm('Clear all entries on this inspection form? This cannot be undone.')) return;
    state = { header:{}, items:{}, temps:{}, comments:{}, photos:{} };
    document.querySelectorAll('.seg-btn.active').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('input[type=text], input[data-temp]').forEach(i => i.value = '');
    document.querySelectorAll('textarea').forEach(t => t.value = '');
    document.getElementById('f_date').value = new Date().toISOString().slice(0,10);
    document.getElementById('f_tag').value = '75-CV-03';
    document.getElementById('f_vibration').checked = true;
    document.getElementById('f_visual').checked = false;
    document.getElementById('tagPill').textContent = '75-CV-03';
    state.header.f_date = document.getElementById('f_date').value;
    state.header.f_tag = '75-CV-03';
    state.header.f_vibration = true;
    SECTIONS.forEach(sec => { document.getElementById('strip_'+sec.id).querySelectorAll('.photo-thumb').forEach(el=>el.remove()); refreshSection(sec); });
    refreshProgress();
    saveDraft();
    showToast('Form cleared');
  });

  /* ---------------- Toast ---------------- */
  let toastTimer = null;
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  /* ---------------- PDF export ---------------- */
  function statusLabel(v){
    if (v === 'ok') return {text:'OK', cls:'ok'};
    if (v === 'notok') return {text:'NOT OK', cls:'notok'};
    if (v === 'na') return {text:'N/A', cls:'na'};
    return {text:'—', cls:'na'};
  }

  function buildReportHTML(){
    const h = state.header;
    const notOkCount = Object.values(state.items).filter(v => v==='notok').length;
    const okCount = Object.values(state.items).filter(v => v==='ok').length;
    const totalItems = SECTIONS.reduce((n,s)=>n+s.items.length,0);

    let html = `
      <h1>Yard Conveyor Belt — Condition Monitoring Check Sheet</h1>
      <div class="sub">Ambatovy Maintenance Asset Management</div>
      <table>
        <tr><th>Equipment Tag #</th><td>${esc(h.f_tag||'')}</td><th>Date</th><td>${esc(h.f_date||'')}</td></tr>
        <tr><th>WO #</th><td>${esc(h.f_wo||'')}</td><th>Method</th><td>${h.f_visual?'Visual ':''}${h.f_vibration?'Vibration':''}</td></tr>
        <tr><th>Check by</th><td>${esc(h.f_checkby||'')}</td><th>Review by</th><td>${esc(h.f_reviewby||'')}</td></tr>
      </table>
      <div class="rep-summary">
        <div><b>${okCount}</b> OK</div>
        <div><b>${notOkCount}</b> Not OK</div>
        <div><b>${totalItems}</b> total checks</div>
      </div>`;

    SECTIONS.forEach(sec => {
      html += `<div class="rep-section-title">${esc(sec.title)}</div>`;
      sec.items.forEach(item => {
        const s = statusLabel(state.items[item.id]);
        html += `<div class="rep-item"><span>${esc(item.label)}</span><span class="rep-status ${s.cls}">${s.text}</span></div>`;
      });
      if (sec.temps && sec.temps.length){
        const readings = sec.temps.map(t => `${t.label}: ${esc(state.temps[t.id]||'—')}°C`).join(' · ');
        html += `<div class="rep-comment"><b>Temperatures</b>${sec.tempNote?' (target '+sec.tempNote+')':''} — ${readings}</div>`;
      }
      const comment = state.comments[sec.id];
      if (comment) html += `<div class="rep-comment"><b>Comments:</b> ${esc(comment)}</div>`;
      const photos = state.photos[sec.id] || [];
      if (photos.length){
        html += `<div class="rep-photos">${photos.map(src => `<img src="${src}">`).join('')}</div>`;
      }
    });
    return html;
  }

  function esc(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('btnPdf').addEventListener('click', async () => {
    const btn = document.getElementById('btnPdf');
    btn.disabled = true; btn.textContent = 'Building PDF…';
    try{
      const reportRoot = document.getElementById('reportRoot');
      reportRoot.innerHTML = buildReportHTML();

      const canvas = await html2canvas(reportRoot, { scale: 2, useCORS: true, backgroundColor:'#ffffff' });
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'pt', 'a4');
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const imgW = pageW;
      const imgH = canvas.height * imgW / canvas.width;

      let heightLeft = imgH;
      let position = 0;
      const imgData = canvas.toDataURL('image/jpeg', 0.92);

      pdf.addImage(imgData, 'JPEG', 0, position, imgW, imgH);
      heightLeft -= pageH;
      while (heightLeft > 0){
        position = heightLeft - imgH;
        pdf.addPage();
        pdf.addImage(imgData, 'JPEG', 0, position, imgW, imgH);
        heightLeft -= pageH;
      }

      const tag = (state.header.f_tag || '75-CV-03').replace(/[^a-z0-9\-]/gi,'_');
      const date = state.header.f_date || new Date().toISOString().slice(0,10);
      pdf.save(`Conveyor_Inspection_${tag}_${date}.pdf`);
      showToast('PDF downloaded');
    } catch(err){
      showToast('PDF export failed — try again');
      console.error(err);
    } finally {
      btn.disabled = false; btn.textContent = 'Download PDF';
    }
  });

  /* ---------------- Init ---------------- */
  refreshProgress();
  loadDraft();

})();
</script>
</body>
</html>
